<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RubisCOde</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="hero">
        <h1>RubisCOde</h1>
        <p>Detector de mutações no gene <b>rbcL</b> (DNA → proteína + interpretação)</p>
    </header>

    <main class="container">
        <section class="card">
            <label for="ref">Sequência referência</label>
            <textarea id="ref" placeholder="Cole aqui a sequência referência (A/C/G/T)"></textarea>

            <label for="mut">Sequência mutada</label>
            <textarea id="mut" placeholder="Cole aqui a sequência mutada (mesmo tamanho)"></textarea>

            <div class="actions">
                <button id="btnAnalisar" type="button">Analisar</button>
                <button id="btnExemplo" type="button" class="ghost">Carregar exemplo</button>
            </div>

            <h2 class="title">Resultados</h2>
            <div id="output" class="output"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
